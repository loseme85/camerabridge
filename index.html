<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeicaShark — Used Leica Search</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #cc0000;
    --black: #111;
    --gray-dark: #333;
    --gray-mid: #888;
    --gray-light: #e8e8e8;
    --bg: #f5f5f3;
    --white: #fff;
    --border: #ddd;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--black); min-height: 100vh; }

  header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 32px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; color: var(--black); text-decoration: none; flex-shrink: 0; cursor: pointer; }
  .logo span { color: var(--red); }
  .search-wrap { flex: 1; max-width: 600px; display: flex; align-items: center; background: var(--bg); border: 1.5px solid var(--border); border-radius: 6px; overflow: hidden; transition: border-color 0.2s; }
  .search-wrap:focus-within { border-color: var(--black); }
  #search-input { flex: 1; border: none; background: transparent; padding: 10px 16px; font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; color: var(--black); }
  .search-btn { background: var(--black); border: none; padding: 10px 18px; cursor: pointer; color: var(--white); font-size: 16px; transition: background 0.2s; }
  .search-btn:hover { background: var(--red); }
  .clear-btn { background: none; border: none; padding: 10px 12px; cursor: pointer; color: var(--gray-mid); font-size: 20px; line-height: 1; }

  main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

  .hero { text-align: center; padding: 100px 20px; }
  .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: 72px; letter-spacing: 4px; line-height: 1; margin-bottom: 12px; }
  .hero-title span { color: var(--red); }
  .hero-sub { font-size: 16px; color: var(--gray-mid); margin-bottom: 40px; }
  .hero-search { max-width: 520px; margin: 0 auto; display: flex; border: 2px solid var(--black); border-radius: 6px; overflow: hidden; }
  .hero-search input { flex: 1; padding: 14px 20px; font-family: 'DM Sans', sans-serif; font-size: 16px; border: none; outline: none; }
  .hero-search button { background: var(--black); color: var(--white); border: none; padding: 14px 28px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
  .hero-search button:hover { background: var(--red); }
  .hero-tags { margin-top: 20px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .hero-tag { padding: 6px 14px; border: 1.5px solid var(--border); border-radius: 20px; font-size: 13px; cursor: pointer; background: var(--white); transition: all 0.15s; }
  .hero-tag:hover { background: var(--black); color: var(--white); border-color: var(--black); }

  .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .results-title { font-size: 13px; color: var(--gray-mid); }
  .results-title strong { color: var(--black); font-size: 24px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; margin-right: 6px; }

  .tabs { display: flex; margin-bottom: 20px; }
  .tab { padding: 8px 20px; border: 1.5px solid var(--border); background: var(--white); cursor: pointer; font-size: 13px; font-weight: 500; color: var(--gray-mid); transition: all 0.15s; }
  .tab:first-child { border-radius: 6px 0 0 6px; }
  .tab:last-child { border-radius: 0 6px 6px 0; border-left: none; }
  .tab.active { background: var(--black); border-color: var(--black); color: var(--white); }

  .filters-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-label { font-size: 11px; font-weight: 500; color: var(--gray-mid); text-transform: uppercase; letter-spacing: 0.8px; }
  select { border: 1.5px solid var(--border); background: var(--white); padding: 7px 12px; border-radius: 5px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--black); cursor: pointer; outline: none; }
  select:focus { border-color: var(--black); }

  .stats-bar { display: flex; gap: 24px; margin-bottom: 20px; padding: 16px 20px; background: var(--white); border: 1px solid var(--border); border-radius: 8px; }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 1px; color: var(--black); line-height: 1; }
  .stat-label { font-size: 11px; color: var(--gray-mid); text-transform: uppercase; letter-spacing: 0.6px; }
  .stat-divider { width: 1px; background: var(--border); align-self: stretch; }

  .table-wrap { background: var(--white); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .table-head { display: grid; grid-template-columns: 72px 1fr 170px 130px 90px; padding: 10px 20px; border-bottom: 1.5px solid var(--border); background: var(--bg); }
  .table-head span { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; color: var(--gray-mid); }
  .table-head .sortable { cursor: pointer; }
  .table-head .sortable:hover { color: var(--black); }

  .result-row { display: grid; grid-template-columns: 72px 1fr 170px 130px 90px; padding: 12px 20px; border-bottom: 1px solid var(--border); align-items: center; text-decoration: none; color: inherit; transition: background 0.1s; }
  .result-row:last-child { border-bottom: none; }
  .result-row:hover { background: #fafafa; }
  .result-row.soldout { opacity: 0.45; }

  .result-img { width: 56px; height: 56px; object-fit: cover; border-radius: 4px; background: var(--gray-light); display: block; }
  .img-placeholder { width: 56px; height: 56px; border-radius: 4px; background: var(--gray-light); display: flex; align-items: center; justify-content: center; color: var(--gray-mid); font-size: 18px; }

  .product-name { font-size: 14px; font-weight: 500; line-height: 1.4; padding-right: 16px; }
  .product-meta { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 2px 7px; border-radius: 3px; font-family: 'DM Mono', monospace; }
  .badge-gen { background: #f0f0f0; color: var(--gray-dark); }
  .badge-cond { background: #e8f4e8; color: #2a7a2a; }
  .badge-soldout { background: #fde8e8; color: #cc0000; }

  .site-col { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--gray-dark); }
  .price { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; color: var(--red); }
  .currency { font-size: 11px; color: var(--gray-mid); margin-top: 2px; }

  .no-results { text-align: center; padding: 60px 20px; color: var(--gray-mid); }
  .no-results .icon { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>

<header>
  <div class="logo" onclick="showHero()">LEICA<span>SHARK</span></div>
  <div class="search-wrap" id="header-search-wrap" style="display:none">
    <input id="search-input" type="text" placeholder="Summilux, Elmarit, M11...">
    <button class="clear-btn" onclick="clearSearch()">×</button>
    <button class="search-btn" onclick="doSearch()">⌕</button>
  </div>
</header>

<main>
  <!-- HERO -->
  <div id="hero-section" class="hero">
    <div class="hero-title">LEICA<span>SHARK</span></div>
    <p class="hero-sub">전세계 라이카 중고 매물 통합 검색</p>
    <div class="hero-search">
      <input type="text" id="hero-input" placeholder="Summilux 50, Elmarit 28, M11..."
             onkeydown="if(event.key==='Enter') doHeroSearch()">
      <button onclick="doHeroSearch()">Search</button>
    </div>
    <div class="hero-tags">
      <span class="hero-tag" onclick="quickSearch('Summilux 50')">Summilux 50</span>
      <span class="hero-tag" onclick="quickSearch('Elmarit 28')">Elmarit 28</span>
      <span class="hero-tag" onclick="quickSearch('Summicron 35')">Summicron 35</span>
      <span class="hero-tag" onclick="quickSearch('Noctilux')">Noctilux</span>
      <span class="hero-tag" onclick="quickSearch('M11')">M11</span>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results-section" style="display:none">
    <div class="results-header">
      <div class="results-title">
        <strong id="result-count">0</strong> results for "<span id="query-display"></span>"
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="setTab('sale',this)">For Sale (<span id="sale-count">0</span>)</button>
      <button class="tab" onclick="setTab('sold',this)">품절 (<span id="sold-count">0</span>)</button>
    </div>

    <div class="filters-row">
      <span class="filter-label">Sort</span>
      <select id="sort-select" onchange="renderResults()">
        <option value="default">기본순</option>
        <option value="price-asc">가격 낮은순</option>
        <option value="price-desc">가격 높은순</option>
      </select>
      <span class="filter-label">사이트</span>
      <select id="site-select" onchange="renderResults()">
        <option value="all">전체</option>
      </select>
      <span class="filter-label">통화</span>
      <select id="currency-select" onchange="renderResults()">
        <option value="all">전체</option>
        <option value="KRW">KRW 🇰🇷</option>
        <option value="GBP">GBP 🇬🇧</option>
      </select>
    </div>

    <div class="stats-bar" id="stats-bar"></div>

    <div class="table-wrap">
      <div class="table-head">
        <span></span>
        <span>Product</span>
        <span>Site</span>
        <span class="sortable" onclick="togglePriceSort()">Price ↕</span>
        <span>Condition</span>
      </div>
      <div id="results-list"></div>
    </div>
  </div>
</main>

<script>
let allData = [];
let currentTab = 'sale';
let priceSort = 0; // 0=default, 1=asc, -1=desc

const FLAGS = {
  '라이카스토어 충무로':'🇰🇷','사진집':'🇰🇷','장씨카메라':'🇰🇷',
  '신성카메라':'🇰🇷','억불카메라':'🇰🇷','Ffordes (영국)':'🇬🇧'
};

async function loadData() {
  try {
    const res = await fetch('results.json');
    allData = await res.json();
    const sites = [...new Set(allData.map(r => r.site))];
    const sel = document.getElementById('site-select');
    sites.forEach(s => {
      const o = document.createElement('option');
      o.value = s; o.textContent = (FLAGS[s]||'🌐') + ' ' + s;
      sel.appendChild(o);
    });
  } catch(e) { console.error(e); }
}

function quickSearch(q) {
  document.getElementById('hero-input').value = q;
  doHeroSearch();
}

function doHeroSearch() {
  const q = document.getElementById('hero-input').value.trim();
  if (!q) return;
  document.getElementById('search-input').value = q;
  document.getElementById('header-search-wrap').style.display = 'flex';
  document.getElementById('hero-section').style.display = 'none';
  document.getElementById('results-section').style.display = 'block';
  renderResults(q);
}

function doSearch() {
  renderResults(document.getElementById('search-input').value.trim());
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  showHero();
}

function showHero() {
  document.getElementById('hero-section').style.display = 'block';
  document.getElementById('results-section').style.display = 'none';
  document.getElementById('header-search-wrap').style.display = 'none';
}

function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderResults();
}

function togglePriceSort() {
  if (priceSort === 0 || priceSort === -1) priceSort = 1;
  else priceSort = -1;
  document.getElementById('sort-select').value = priceSort === 1 ? 'price-asc' : 'price-desc';
  renderResults();
}

function parsePrice(p, cur) {
  if (!p || p === '문의요망') return Infinity;
  const n = parseFloat(p.replace(/[^0-9.]/g,''));
  return cur === 'GBP' ? n * 1700 : n;
}

function renderResults(query) {
  if (query === undefined) query = document.getElementById('search-input').value.trim();
  document.getElementById('query-display').textContent = query;

  const site = document.getElementById('site-select').value;
  const cur = document.getElementById('currency-select').value;
  const sort = document.getElementById('sort-select').value;

  let filtered = allData.filter(r => {
    if (query && !r['상품명'].toLowerCase().includes(query.toLowerCase())) return false;
    if (site !== 'all' && r.site !== site) return false;
    if (cur !== 'all' && r['통화'] !== cur) return false;
    return true;
  });

  const forSale = filtered.filter(r => !r['품절']);
  const soldOut = filtered.filter(r => r['품절']);
  document.getElementById('sale-count').textContent = forSale.length;
  document.getElementById('sold-count').textContent = soldOut.length;
  document.getElementById('result-count').textContent = filtered.length;

  let display = currentTab === 'sale' ? forSale : soldOut;

  if (sort === 'price-asc') display = [...display].sort((a,b) => parsePrice(a['가격'],a['통화']) - parsePrice(b['가격'],b['통화']));
  else if (sort === 'price-desc') display = [...display].sort((a,b) => parsePrice(b['가격'],b['통화']) - parsePrice(a['가격'],a['통화']));

  const prices = display.map(r => parsePrice(r['가격'],r['통화'])).filter(p => p !== Infinity);
  const fmt = n => n >= 1000000 ? '₩'+Math.round(n/10000)+'만' : '₩'+Math.round(n/1000)+'K';
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><span class="stat-value">${display.length}</span><span class="stat-label">Listings</span></div>
    <div class="stat-divider"></div>
    <div class="stat"><span class="stat-value">${prices.length ? fmt(Math.min(...prices)) : '-'}</span><span class="stat-label">Lowest</span></div>
    <div class="stat-divider"></div>
    <div class="stat"><span class="stat-value">${prices.length ? fmt(prices.reduce((a,b)=>a+b,0)/prices.length) : '-'}</span><span class="stat-label">Average</span></div>
    <div class="stat-divider"></div>
    <div class="stat"><span class="stat-value">${prices.length ? fmt(Math.max(...prices)) : '-'}</span><span class="stat-label">Highest</span></div>
    <div class="stat-divider"></div>
    <div class="stat"><span class="stat-value">${new Set(display.map(r=>r.site)).size}</span><span class="stat-label">Sites</span></div>
  `;

  const list = document.getElementById('results-list');
  if (!display.length) {
    list.innerHTML = `<div class="no-results"><div class="icon">🔍</div><p>검색 결과가 없어요</p></div>`;
    return;
  }

  list.innerHTML = display.map(r => {
    const flag = FLAGS[r.site] || '🌐';
    const hasImg = r['이미지'] && r['이미지'] !== '이미지 없음';
    const imgEl = hasImg
      ? `<img class="result-img" src="${r['이미지']}" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
      : '';
    const ph = `<div class="img-placeholder" style="${hasImg?'display:none':''}">📷</div>`;
    const gen = r['세대'] !== '세대미상' ? `<span class="badge badge-gen">${r['세대']}</span>` : '';
    const cond = r['컨디션'] && r['컨디션'] !== '정보없음' ? `<span class="badge badge-cond">${r['컨디션']}</span>` : '';
    const sold = r['품절'] ? `<span class="badge badge-soldout">품절</span>` : '';
    return `<a class="result-row${r['품절']?' soldout':''}" href="${r['링크']}" target="_blank">
      <div>${imgEl}${ph}</div>
      <div><div class="product-name">${r['상품명']}</div><div class="product-meta">${gen}${cond}${sold}</div></div>
      <div class="site-col"><span>${flag}</span>${r.site}</div>
      <div><div class="price">${r['가격']}</div><div class="currency">${r['통화']}</div></div>
      <div>${cond || '-'}</div>
    </a>`;
  }).join('');
}

document.addEventListener('DOMContentLoaded', () => {
  loadData();
  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });
});
</script>
</body>
</html>
