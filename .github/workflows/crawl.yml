name: Camera Bridge Auto Crawl

on:
  schedule:
    - cron: '0 3 * * *'   # 오후 12시 KST
    - cron: '0 6 * * *'   # 오후 3시 KST
    - cron: '0 9 * * *'   # 오후 6시 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Notify start
        run: |
          KST=$(date '+%Y-%m-%d %H:%M' -d '+9 hours')
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="🤖 Camera Bridge 크롤링 시작%0A📅 ${KST} KST"

      - name: Run crawler
        run: python3 test.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push results
        run: |
          git config user.name "Camera Bridge Bot"
          git config user.email "bot@camerabridge.app"
          git add results.json sold_items.json crawl_sessions.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git stash
          git pull --rebase origin main
          git stash pop
          git add results.json sold_items.json crawl_sessions.json
          git commit -m "🤖 Auto crawl $(date '+%Y-%m-%d %H:%M KST' -d '+9 hours')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify success
        if: success()
        run: |
          KST=$(date '+%Y-%m-%d %H:%M' -d '+9 hours')
          COUNT=$(python3 -c "import json; data=json.load(open('results.json')); print(len(data))" 2>/dev/null || echo "?")
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="✅ 크롤링 완료!%0A📦 총 ${COUNT}개 상품%0A📅 ${KST} KST"

      - name: Notify failure
        if: failure()
        run: |
          KST=$(date '+%Y-%m-%d %H:%M' -d '+9 hours')
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ 크롤링 실패!%0A📅 ${KST} KST%0A🔗 https://github.com/loseme85/camerabridge/actions"
