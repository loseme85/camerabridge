<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camera Bridge</title>
  <style>
    :root{
      --bg:#f7f6f3;
      --surface:#ffffff;
      --surface-2:#f1efeb;
      --surface-3:#e8e3dc;
      --border:#ded9d1;
      --border-strong:#c8c1b7;
      --text:#191817;
      --dim:#68615a;
      --muted:#9a9288;
      --accent:#e11f26;
      --accent-soft:rgba(225,31,38,0.08);
      --blue:#125c8a;
      --green:#2f7140;
      --amber:#a45f00;
      --shadow:0 16px 40px rgba(27,24,20,0.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      background:var(--bg);
      color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      -webkit-font-smoothing:antialiased;
    }
    button,input,select{font:inherit}
    button{cursor:pointer}
    a{color:inherit}
    .shell{min-height:100vh;display:flex;flex-direction:column}
    .topbar{
      position:sticky;
      top:0;
      z-index:20;
      height:64px;
      display:flex;
      align-items:center;
      gap:20px;
      padding:0 28px;
      background:rgba(247,246,243,0.94);
      border-bottom:1px solid var(--border);
      backdrop-filter:blur(14px);
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:188px;
      font-family:"SFMono-Regular","Roboto Mono",monospace;
      font-size:13px;
      font-weight:800;
      letter-spacing:2px;
      text-decoration:none;
    }
    .brand-mark{width:9px;height:9px;border-radius:50%;background:var(--accent)}
    .brand span{color:var(--accent)}
    .top-search{
      flex:1;
      display:flex;
      align-items:center;
      gap:8px;
      max-width:760px;
    }
    .query-input{
      flex:1;
      min-width:0;
      height:40px;
      border:1px solid var(--border-strong);
      background:var(--surface);
      color:var(--text);
      border-radius:4px;
      padding:0 13px;
      outline:none;
      font-family:"SFMono-Regular","Roboto Mono",monospace;
      font-size:13px;
      letter-spacing:0;
    }
    .query-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
    .icon-button{
      width:40px;
      height:40px;
      border:1px solid var(--accent);
      border-radius:4px;
      background:var(--accent);
      color:#fff;
      font-weight:800;
      line-height:1;
    }
    .icon-button:hover{filter:brightness(0.95)}
    .header-meta{
      margin-left:auto;
      color:var(--muted);
      font-family:"SFMono-Regular","Roboto Mono",monospace;
      font-size:10px;
      letter-spacing:1px;
      white-space:nowrap;
    }
    main{width:100%;max-width:1220px;margin:0 auto;padding:26px 24px 48px}
    .search-band{
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      gap:18px;
      align-items:end;
      padding:22px 0 18px;
      border-bottom:1px solid var(--border);
    }
    .page-title{
      margin:0 0 14px;
      font-family:"SFMono-Regular","Roboto Mono",monospace;
      font-size:34px;
      line-height:1.05;
      letter-spacing:0;
      font-weight:800;
    }
    .page-sub{
      margin:0;
      max-width:720px;
      color:var(--dim);
      font-size:13px;
      line-height:1.6;
    }
    .quick-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .quick-chip{
      height:30px;
      border:1px solid var(--border-strong);
      background:var(--surface);
      color:var(--dim);
      border-radius:4px;
      padding:0 10px;
      font-family:"SFMono-Regular","Roboto Mono",monospace;
      font-size:11px;
    }
    .quick-chip:hover{border-color:var(--accent);color:var(--accent)}
    .controls{
      display:grid;
      grid-template-columns:repeat(5,minmax(140px,1fr));
      gap:10px;
      padding:18px 0;
    }
    .control{
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .control label{
      font-family:"SFMono-Regular","Roboto Mono",monospace;
      color:var(--muted);
      font-size:9px;
      letter-spacing:1.5px;
      text-transform:uppercase;
    }
    .control select{
      height:38px;
      border:1px solid var(--border-strong);
      background:var(--surface);
      color:var(--text);
      border-radius:4px;
      padding:0 10px;
      outline:none;
      font-size:13px;
    }
    .control select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
    .status-strip{
      min-height:48px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      border-top:1px solid var(--border);
      border-bottom:1px solid var(--border);
      padding:12px 0;
      margin-bottom:16px;
    }
    .result-summary{
      display:flex;
      align-items:baseline;
      gap:10px;
      min-width:0;
    }
    .result-summary strong{
      font-family:"SFMono-Regular","Roboto Mono",monospace;
      font-size:28px;
      color:var(--accent);
      letter-spacing:0;
    }
    .result-summary span{
      color:var(--dim);
      font-size:13px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .page-controls{display:flex;align-items:center;gap:8px}
    .page-button{
      height:34px;
      min-width:78px;
      border:1px solid var(--border-strong);
      background:var(--surface);
      color:var(--text);
      border-radius:4px;
      font-family:"SFMono-Regular","Roboto Mono",monospace;
      font-size:11px;
    }
    .page-button:disabled{opacity:0.38;cursor:not-allowed}
    .page-button:not(:disabled):hover{border-color:var(--accent);color:var(--accent)}
    .page-indicator{
      min-width:108px;
      text-align:center;
      color:var(--muted);
      font-family:"SFMono-Regular","Roboto Mono",monospace;
      font-size:10px;
    }
    .state{
      border:1px solid var(--border);
      background:var(--surface);
      border-radius:6px;
      padding:34px 22px;
      color:var(--dim);
      text-align:center;
      font-family:"SFMono-Regular","Roboto Mono",monospace;
      font-size:12px;
      box-shadow:var(--shadow);
    }
    .state.error{border-color:rgba(225,31,38,0.32);background:rgba(225,31,38,0.04);color:var(--accent)}
    .results-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }
    .result-card{
      display:grid;
      grid-template-columns:96px minmax(0,1fr);
      gap:14px;
      min-height:162px;
      border:1px solid var(--border);
      border-radius:6px;
      background:var(--surface);
      padding:12px;
      box-shadow:0 4px 16px rgba(27,24,20,0.04);
    }
    .thumb{
      width:96px;
      aspect-ratio:1;
      border:1px solid var(--border);
      border-radius:4px;
      overflow:hidden;
      background:linear-gradient(135deg,var(--surface-2),var(--surface-3));
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-family:"SFMono-Regular","Roboto Mono",monospace;
      font-size:18px;
      font-weight:800;
    }
    .thumb img{width:100%;height:100%;object-fit:cover;display:block}
    .card-body{min-width:0;display:flex;flex-direction:column;gap:9px}
    .card-title{
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
      min-height:39px;
      color:var(--text);
      text-decoration:none;
      font-size:14px;
      line-height:1.4;
      font-weight:700;
    }
    .card-title:hover{color:var(--accent)}
    .price-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .price{
      font-family:"SFMono-Regular","Roboto Mono",monospace;
      color:var(--accent);
      font-size:14px;
      font-weight:800;
    }
    .source{
      color:var(--dim);
      font-family:"SFMono-Regular","Roboto Mono",monospace;
      font-size:10px;
      text-align:right;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .field-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:5px;
    }
    .field{
      min-width:0;
      border:1px solid var(--border);
      background:var(--surface-2);
      border-radius:4px;
      padding:5px 6px;
    }
    .field b{
      display:block;
      color:var(--muted);
      font-family:"SFMono-Regular","Roboto Mono",monospace;
      font-size:8px;
      letter-spacing:1px;
      text-transform:uppercase;
      margin-bottom:3px;
    }
    .field span{
      display:block;
      min-height:15px;
      color:var(--text);
      font-size:11px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .pill-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:auto}
    .pill{
      border:1px solid var(--border);
      border-radius:3px;
      background:#fff;
      color:var(--dim);
      padding:2px 6px;
      font-family:"SFMono-Regular","Roboto Mono",monospace;
      font-size:9px;
      white-space:nowrap;
    }
    .pill.match{border-color:rgba(18,92,138,0.24);background:rgba(18,92,138,0.07);color:var(--blue)}
    .pill.override{border-color:rgba(47,113,64,0.28);background:rgba(47,113,64,0.08);color:var(--green)}
    .pill.warn{border-color:rgba(164,95,0,0.28);background:rgba(164,95,0,0.08);color:var(--amber)}
    .footer-note{
      color:var(--muted);
      font-family:"SFMono-Regular","Roboto Mono",monospace;
      font-size:10px;
      margin-top:18px;
      line-height:1.6;
    }
    @media(max-width:900px){
      .topbar{height:auto;align-items:flex-start;flex-direction:column;padding:14px 16px}
      .brand{min-width:0}
      .top-search{width:100%;max-width:none}
      .header-meta{display:none}
      main{padding:18px 14px 36px}
      .search-band{grid-template-columns:1fr;align-items:start}
      .quick-row{justify-content:flex-start}
      .controls{grid-template-columns:repeat(2,minmax(0,1fr))}
      .status-strip{align-items:flex-start;flex-direction:column}
      .page-controls{width:100%;justify-content:space-between}
      .results-grid{grid-template-columns:1fr}
    }
    @media(max-width:560px){
      .page-title{font-size:28px}
      .controls{grid-template-columns:1fr}
      .result-card{grid-template-columns:72px minmax(0,1fr)}
      .thumb{width:72px}
      .field-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .icon-button{width:42px;flex-shrink:0}
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a href="/" class="brand" aria-label="Camera Bridge">
        <span class="brand-mark"></span>
        CAMERA <span>BRIDGE</span>
      </a>
      <form class="top-search" id="search-form">
        <input id="query-input" class="query-input" type="search" autocomplete="off" placeholder="35lux aa, q3 28, ltm summaron 35">
        <button class="icon-button" type="submit" aria-label="Search">Go</button>
      </form>
      <div class="header-meta">MARKET DESK</div>
    </header>

    <main>
      <section class="search-band">
        <div>
          <h1 class="page-title">Find rare camera gear</h1>
          <p class="page-sub">Rare bodies, collectible lenses, and hard-to-find dealer listings.</p>
        </div>
        <div class="quick-row" aria-label="Quick searches">
          <button class="quick-chip" type="button" data-query="mp3 silver">mp3 silver</button>
          <button class="quick-chip" type="button" data-query="q3 28">q3 28</button>
          <button class="quick-chip" type="button" data-query="ltm summaron 35">ltm summaron 35</button>
          <button class="quick-chip" type="button" data-query="35lux aa">35lux aa</button>
        </div>
      </section>

      <section class="controls" aria-label="Search filters">
        <div class="control">
          <label for="category-filter">Category</label>
          <select id="category-filter">
            <option value="">Any</option>
            <option value="Lens">Lens</option>
            <option value="Body">Body</option>
            <option value="Accessory">Accessory</option>
          </select>
        </div>
        <div class="control">
          <label for="brand-filter">Brand</label>
          <select id="brand-filter">
            <option value="">Any</option>
            <option value="Leica">Leica</option>
            <option value="Voigtlander">Voigtlander</option>
            <option value="Zeiss">Zeiss</option>
            <option value="Hasselblad">Hasselblad</option>
            <option value="Sigma">Sigma</option>
          </select>
        </div>
        <div class="control">
          <label for="mount-filter">Mount</label>
          <select id="mount-filter">
            <option value="">Any</option>
            <option value="M">M</option>
            <option value="L">L</option>
            <option value="R">R</option>
            <option value="SL">SL</option>
            <option value="Q">Q</option>
            <option value="S">S</option>
          </select>
        </div>
        <div class="control">
          <label for="sold-filter">Sold quality</label>
          <select id="sold-filter">
            <option value="">Any</option>
            <option value="asking">Asking</option>
            <option value="sold">Sold</option>
            <option value="unknown">Unknown</option>
          </select>
        </div>
        <div class="control">
          <label for="sort-select">Sort</label>
          <select id="sort-select">
            <option value="relevance">Relevance</option>
            <option value="price_asc">Price low</option>
            <option value="price_desc">Price high</option>
          </select>
        </div>
      </section>

      <section class="status-strip">
        <div class="result-summary">
          <strong id="result-count">0</strong>
          <span id="result-caption">Ready</span>
        </div>
        <div class="page-controls">
          <button id="prev-button" class="page-button" type="button">Prev</button>
          <span id="page-indicator" class="page-indicator">0-0</span>
          <button id="next-button" class="page-button" type="button">Next</button>
        </div>
      </section>

      <section id="state-region" aria-live="polite"></section>
      <section id="results-grid" class="results-grid" aria-live="polite"></section>
      <div class="footer-note" id="warning-region"></div>
    </main>
  </div>

  <script>
    const PAGE_SIZE = 12;
    const state = {
      query: '',
      offset: 0,
      loading: false,
      response: null,
      error: null
    };

    const els = {};

    function $(id){return document.getElementById(id);}

    function cacheElements(){
      [
        'search-form','query-input','category-filter','brand-filter','mount-filter',
        'sold-filter','sort-select','result-count','result-caption','page-indicator',
        'prev-button','next-button','state-region','results-grid','warning-region'
      ].forEach(id => els[id] = $(id));
    }

    function escapeHtml(value){
      return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[ch]));
    }

    function displayValue(value){
      if(Array.isArray(value)) return value.length ? value.join(', ') : 'Any';
      if(value === null || value === undefined || value === '') return 'Any';
      return String(value);
    }

    function finalField(result, key){
      return (result.final_output || {})[key];
    }

    function buildParams(offset){
      const params = new URLSearchParams();
      params.set('q', state.query);
      params.set('limit', String(PAGE_SIZE));
      params.set('offset', String(offset));
      params.set('sort', els['sort-select'].value || 'relevance');

      const filters = [
        ['category', els['category-filter'].value],
        ['brand', els['brand-filter'].value],
        ['mount', els['mount-filter'].value],
        ['sold_quality', els['sold-filter'].value]
      ];
      filters.forEach(([key, value]) => {
        if(value) params.set(key, value);
      });

      const pageParams = new URLSearchParams(window.location.search);
      if(pageParams.get('debug') === '1') params.set('include_debug', 'true');
      return params;
    }

    function syncUrl(){
      const params = buildParams(state.offset);
      const pageParams = new URLSearchParams(params);
      pageParams.delete('limit');
      if(pageParams.get('offset') === '0') pageParams.delete('offset');
      history.replaceState(null, '', '?' + pageParams.toString());
    }

    async function runSearch(offset = 0){
      const nextQuery = els['query-input'].value.trim();
      if(!nextQuery) return;
      state.query = nextQuery;
      state.offset = Math.max(0, offset);
      state.loading = true;
      state.error = null;
      render();

      try{
        const params = buildParams(state.offset);
        const response = await fetch('/api/search?' + params.toString(), {
          headers: {'Accept':'application/json'},
          cache: 'no-store'
        });
        const payload = await response.json();
        if(!response.ok){
          const message = payload && payload.error ? payload.error.message : 'Search failed';
          throw new Error(message);
        }
        state.response = payload;
        state.error = null;
        syncUrl();
      }catch(error){
        state.response = null;
        state.error = error.message || 'Search failed';
      }finally{
        state.loading = false;
        render();
      }
    }

    function render(){
      renderSummary();
      renderResults();
      renderWarnings();
    }

    function renderSummary(){
      const pagination = state.response ? state.response.pagination || {} : {};
      const total = state.response ? state.response.total_ranked || 0 : 0;
      const resultCount = state.response ? state.response.result_count || 0 : 0;
      const start = total && resultCount ? (pagination.offset || 0) + 1 : 0;
      const end = total && resultCount ? (pagination.offset || 0) + resultCount : 0;

      els['result-count'].textContent = total;
      els['result-caption'].textContent = state.loading
        ? 'Searching'
        : state.query
          ? `${resultCount} shown for "${state.query}"`
          : 'Ready';
      els['page-indicator'].textContent = `${start}-${end}`;
      els['prev-button'].disabled = state.loading || !state.response || (pagination.offset || 0) <= 0;
      els['next-button'].disabled = state.loading || !state.response || !pagination.has_more;
    }

    function renderResults(){
      els['results-grid'].innerHTML = '';
      els['state-region'].innerHTML = '';

      if(state.loading){
        els['state-region'].innerHTML = '<div class="state">Loading results...</div>';
        return;
      }

      if(state.error){
        els['state-region'].innerHTML = `<div class="state error">${escapeHtml(state.error)}</div>`;
        return;
      }

      if(!state.response){
        els['state-region'].innerHTML = '<div class="state">Enter a query to start.</div>';
        return;
      }

      const results = state.response.results || [];
      if(!results.length){
        els['state-region'].innerHTML = '<div class="state">No results.</div>';
        return;
      }

      els['results-grid'].innerHTML = results.map(renderCard).join('');
    }

    function renderCard(result){
      const title = result.title || 'Untitled listing';
      const url = result.source_url || '#';
      const imageUrl = result.image_url;
      const matched = (result.matched_fields || []).slice(0, 5);
      const warnings = (result.warnings || []).slice(0, 2);
      const variant = finalField(result, 'variant');
      const safeUrl = escapeHtml(url);
      const target = url && url !== '#' ? ' target="_blank" rel="noopener noreferrer"' : '';
      const thumb = imageUrl
        ? `<img src="${escapeHtml(imageUrl)}" alt="">`
        : '<span>CB</span>';

      return `
        <article class="result-card">
          <div class="thumb">${thumb}</div>
          <div class="card-body">
            <a class="card-title" href="${safeUrl}"${target}>${escapeHtml(title)}</a>
            <div class="price-row">
              <div class="price">${escapeHtml(result.price || 'Ask')}</div>
              <div class="source">${escapeHtml(result.source || 'Unknown source')}</div>
            </div>
            <div class="field-grid">
              ${renderField('brand', finalField(result, 'brand'))}
              ${renderField('mount', finalField(result, 'mount'))}
              ${renderField('category', finalField(result, 'category'))}
              ${renderField('label', finalField(result, 'label'))}
              ${renderField('model', finalField(result, 'model_canonical'))}
              ${renderField('variant', variant)}
              ${renderField('focal', finalField(result, 'focal_length'))}
              ${renderField('sold', finalField(result, 'sold_quality'))}
            </div>
            <div class="pill-row">
              ${result.used_override ? '<span class="pill override">trusted</span>' : ''}
              ${matched.map(field => `<span class="pill match">${escapeHtml(field)}</span>`).join('')}
              ${warnings.map(warning => `<span class="pill warn">${escapeHtml(warning)}</span>`).join('')}
            </div>
          </div>
        </article>
      `;
    }

    function renderField(label, value){
      return `<div class="field"><b>${escapeHtml(label)}</b><span title="${escapeHtml(displayValue(value))}">${escapeHtml(displayValue(value))}</span></div>`;
    }

    function renderWarnings(){
      if(!state.response || state.loading || state.error){
        els['warning-region'].textContent = '';
        return;
      }
      const warnings = state.response.warnings || [];
      const filters = state.response.applied_filters || {};
      const filterText = Object.keys(filters).length
        ? `filters: ${Object.entries(filters).map(([key,value]) => `${key}=${value}`).join(', ')}`
        : 'filters: none';
      els['warning-region'].textContent = `${filterText}${warnings.length ? ' | ' + warnings.join(', ') : ''}`;
    }

    function hydrateFromUrl(){
      const params = new URLSearchParams(window.location.search);
      const q = params.get('q') || '';
      els['query-input'].value = q;
      els['category-filter'].value = params.get('category') || '';
      els['brand-filter'].value = params.get('brand') || '';
      els['mount-filter'].value = params.get('mount') || '';
      els['sold-filter'].value = params.get('sold_quality') || '';
      els['sort-select'].value = params.get('sort') || 'relevance';
      const offset = Number.parseInt(params.get('offset') || '0', 10);
      if(q) runSearch(Number.isFinite(offset) ? offset : 0);
      else render();
    }

    function bindEvents(){
      els['search-form'].addEventListener('submit', event => {
        event.preventDefault();
        runSearch(0);
      });

      ['category-filter','brand-filter','mount-filter','sold-filter','sort-select'].forEach(id => {
        els[id].addEventListener('change', () => {
          if(state.query || els['query-input'].value.trim()) runSearch(0);
        });
      });

      els['prev-button'].addEventListener('click', () => {
        const current = state.response ? state.response.pagination || {} : {};
        runSearch(Math.max(0, (current.offset || 0) - PAGE_SIZE));
      });

      els['next-button'].addEventListener('click', () => {
        const current = state.response ? state.response.pagination || {} : {};
        if(current.has_more) runSearch(current.next_offset || ((current.offset || 0) + PAGE_SIZE));
      });

      document.querySelectorAll('[data-query]').forEach(button => {
        button.addEventListener('click', () => {
          els['query-input'].value = button.dataset.query || '';
          runSearch(0);
        });
      });
    }

    cacheElements();
    bindEvents();
    hydrateFromUrl();
  </script>
</body>
</html>
